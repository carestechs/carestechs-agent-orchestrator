# Production compose under the DevTools umbrella.
#
# This file assumes the shared infra is already up — the external `infra`
# network must exist (created by `~/Desktop/Repos/DevTools/infra/`) and
# `postgres` must be reachable on it under the container name `postgres`.
# Run the project standalone via `docker-compose.yml` (which brings up a
# self-contained postgres) when you don't want the umbrella.
#
# See `~/Desktop/Repos/DevTools/devtools-umbrella.md` for the pattern.
services:
  orchestrator-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestrator-api
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - infra
    restart: unless-stopped

networks:
  infra:
    external: true
