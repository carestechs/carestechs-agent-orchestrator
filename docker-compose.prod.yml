services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infra

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchestrator}
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - infra

volumes:
  pgdata:

networks:
  infra:
    external: true
